Love • Reflection • Regret 
</p>

<!-- Letters Section -->

<section class="khutoot-section">

<div id="khutoot-container">

<!-- Letters will load from CMS -->

<!-- Footer -->

<footer>

<p>Diwan-e-Arsh</p>

<p>© All Rights Reserved</p>

</footer>



<script src="js/main.js"></script>



<!-- Khutoot CMS Loader -->

<script>

fetch("/content/khutoot.json")
.then(response => response.json())
.then(data => {

const container = document.getElementById("khutoot-container");

if(data.items){

data.items.slice().reverse().forEach(item => {

const letter = document.createElement("div");

letter.classList.add("khutoot");

letter.innerHTML = `

<div class="khutoot-header">

<div class="khutoot-date">
${item.date || ""}
</div>

<div class="khutoot-title">
${item.title || ""}
</div>

</div>

<div class="khutoot-content">
${item.text.replace(/\n/g,"<br>")}
</div>

<div class="khutoot-sign">
— Arsh
</div>

`;

container.appendChild(letter);

});

}

})
.catch(error => console.log("Khutoot Load Error", error));

</script>
