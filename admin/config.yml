backend:
  name: github
  repo: arshnawabofficial/Diwan-e-Arsh
  branch: main

publish_mode: editorial_workflow

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:

# ========================
# Ashaar
# ========================

  - name: "ashaar"
    label: "Ashaar"
    files:
      - file: "content/ashaar.json"
        label: "Ashaar"
        name: "ashaar"
        fields:
          - label: "Ashaar"
            name: "items"
            widget: "list"
            fields:
              - { label: "Text", name: "text", widget: "text" }


# ========================
# Ghazal
# ========================

  - name: "ghazal"
    label: "Ghazal"
    files:
      - file: "content/ghazal.json"
        label: "Ghazal"
        name: "ghazal"
        fields:
          - label: "Ghazal"
            name: "items"
            widget: "list"
            fields:

              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - Bab-e-Intezaar
                  - Bab-e-Hijr
                  - Bab-e-Karb
                  - Bab-e-Be-Naam
                  - Bab-e-Tasawwur
                  - Bab-e-Falsafa
                  - Bab-e-Iqraar
                  - Bab-e-Ibtida

              - { label: "Text", name: "text", widget: "text" }


# ========================
# Rubai
# ========================

  - name: "rubai"
    label: "Rubai"
    files:
      - file: "content/rubai.json"
        label: "Rubai"
        name: "rubai"
        fields:
          - label: "Rubai"
            name: "items"
            widget: "list"
            fields:
              - { label: "Text", name: "text", widget: "text" }


# ========================
# Kalaam-e-Fikr
# ========================

  - name: "kalaam"
    label: "Kalaam-e-Fikr"
    files:
      - file: "content/kalaam.json"
        label: "Kalaam-e-Fikr"
        name: "kalaam"
        fields:
          - label: "Kalaam"
            name: "items"
            widget: "list"
            fields:

              - label: "Section"
                name: "section"
                widget: "select"
                options:
                  - insaan
                  - khuda
                  - zindagi

              - { label: "Text", name: "text", widget: "text" }


# ========================
# Khutoot
# ========================

  - name: "khutoot"
    label: "Khutoot"
    files:
      - file: "content/khutoot.json"
        label: "Khutoot"
        name: "khutoot"
        fields:
          - label: "Letters"
            name: "items"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string", required: false }
              - { label: "Date", name: "date", widget: "string", required: false }
              - { label: "Letter", name: "text", widget: "text" }
